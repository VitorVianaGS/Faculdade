<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>
<body>
    
    <form action="" method="post">

<br><br>
<label for="nome">Nome:</label>
<input type="text" name="nome" placeholder="Digite seu nome" size="50" maxlength="50">

<br><br>

<label for="senha">Senha</label>
<input type="text" type="password" placeholder="Senha" name="senha" size="8" maxlength="8">

<br><br>

<fieldset>

<label for="linguagem">Linguagem de interesse</label>
<br><br>

<input type="checkbox" name="linguagem[]" value="Python" >Python
<input type="checkbox" name="linguagem[]" value="Java">Java
<input type="checkbox" name="linguagem[]" value="php">php

</fieldset>

<br><br>
<label for="linguagemescolhida">linguagem que irá cursar</label>
<br><br>

<input type="radio" name="curso" value="Python">Python
<input type="radio" name="curso" value="Java">Java
<input type="radio" name="curso" value="php">php
<br><br>

<select name="escola">
    <option value="python">Python</option>
    <option value="Java">Java</option>
    <option value="php">php</option>
</select>

<br><br>

<input type="submit" name="submit" id="submit" value="Enviar">

    </form>

</body>
</html>
